appId: com.chriz3656.webdock
productName: WebDock
directories:
  output: dist
files:
  - build/**/*
  - assets/**/*
  - package.json
publish:
  provider: github
  releaseType: release
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: assets/icon.png
  category: public.app-category.productivity
  identity: null
win:
  target:
    - target: nsis
    - target: portable
  icon: assets/icon.png
linux:
  target:
    - target: AppImage
    - target: deb
  icon: assets/icon.png
  category: Utility
